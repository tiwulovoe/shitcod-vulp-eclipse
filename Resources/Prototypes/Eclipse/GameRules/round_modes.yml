- type: entity
  parent: BaseGameRule
  id: EclipseExtendedDifficultyOneDynamicRule
  components:
  - type: GameRule
    minPlayers: 1
  - type: DynamicRule
    budgetPerSecond: 0.04
    startingBudgetMin: 90
    startingBudgetMax: 150
    minRuleInterval: 1080
    maxRuleInterval: 1800
    table: !type:AllSelector
      children:
      - !type:GroupSelector
        conditions:
        - !type:RoundDurationCondition
          max: 1
        children:
        - id: Traitor
          weight: 85
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
      - !type:GroupSelector
        conditions:
        - !type:RoundDurationCondition
          max: 1
        children:
        - id: Thief
          prob: 0.5
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
      - !type:GroupSelector
        conditions:
        - !type:RoundDurationCondition
          min: 1800
        children:
        - id: SleeperAgents
          weight: 65
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
        - id: ParadoxCloneSpawn
          weight: 35
          conditions:
          - !type:HasBudgetCondition
          - !type:MaxRuleOccurenceCondition
            max: 2

