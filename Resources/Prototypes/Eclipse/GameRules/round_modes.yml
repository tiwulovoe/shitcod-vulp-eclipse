- type: entityTable
  id: EclipseCalmFaunaGameRulesTable
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: CalmPestEventsTable

- type: entityTable
  id: EclipseModerateGameRulesTable
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: BasicCalmEventsTable
    - !type:NestedSelector
      tableId: BasicAntagEventsTable
    - !type:NestedSelector
      tableId: CargoGiftsTable
    - !type:NestedSelector
      tableId: CalmPestEventsTable
    - !type:NestedSelector
      tableId: SpicyPestEventsTable

- type: entity
  id: EclipseCalmStationEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    minimumTimeUntilFirstEvent: 900
    maximumSpanUntilFirstEvent: 300
    minMaxEventTiming:
      min: 1200
      max: 2100
    scheduledGameRules: !type:NestedSelector
      tableId: EclipseCalmFaunaGameRulesTable

