name: Diff RSIs

on:
  pull_request_target:
    paths:
      - '**.rsi/**.png'

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diff:
    name: Diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get changed files
        id: files
        uses: Ana06/get-changed-files@v2.3.0
        with:
          format: 'space-delimited'
          filter: |
            **.rsi
            **.png

      - name: Diff changed RSIs
        id: diff
        uses: space-wizards/RSIDiffBot@v1.1
        with:
          modified: ${{ steps.files.outputs.modified }}
          removed: ${{ steps.files.outputs.removed }}
          added: ${{ steps.files.outputs.added }}
          basename: ${{ github.event.pull_request.base.repo.full_name }}
          basesha: ${{ github.event.pull_request.base.sha }}
          headname: ${{ github.event.pull_request.head.repo.full_name }}
          headsha: ${{ github.event.pull_request.head.sha }}

      - name: Write diff summary
        env:
          BODY: ${{ steps.diff.outputs.summary-details }}
        run: |
          set -euo pipefail

          {
            echo '## RSI Diff'
            echo
            printf '%s\n' "$BODY"
          } >> "$GITHUB_STEP_SUMMARY"
