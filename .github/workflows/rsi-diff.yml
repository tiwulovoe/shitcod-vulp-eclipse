name: Diff RSIs

on:
  pull_request_target:
    paths:
      - '**.rsi/**.png'

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diff:
    name: Diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Get changed files
        id: files
        uses: Ana06/get-changed-files@v2.3.0
        with:
          format: 'space-delimited'
          filter: |
            **.rsi
            **.png

      - name: Diff changed RSIs
        id: diff
        uses: space-wizards/RSIDiffBot@v1.1
        with:
          modified: ${{ steps.files.outputs.modified }}
          removed: ${{ steps.files.outputs.removed }}
          added: ${{ steps.files.outputs.added }}
          basename: ${{ github.event.pull_request.base.repo.full_name }}
          basesha: ${{ github.event.pull_request.base.sha }}
          headname: ${{ github.event.pull_request.head.repo.full_name }}
          headsha: ${{ github.event.pull_request.head.sha }}

      - name: Create or update comment
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.diff.outputs.summary-details }}
          ISSUE_NUMBER: ${{ github.event.number }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if ! comment_id="$(
            gh api "repos/${REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("RSI Diff Bot"))) | .id' \
              | head -n 1
          )"; then
            echo "::warning::Unable to read existing RSI diff comments."
            exit 0
          fi

          body="${BODY}"
          if [ -n "$comment_id" ]; then
            body="${body}"$'\n\n'"Edit: diff updated after ${HEAD_SHA}"
          fi

          jq -n --arg body "$body" '{ body: $body }' > comment.json

          if [ -n "$comment_id" ]; then
            gh api \
              --method PATCH \
              "repos/${REPOSITORY}/issues/comments/${comment_id}" \
              --input comment.json \
              || echo "::warning::Unable to update RSI diff comment."
          else
            gh api \
              --method POST \
              "repos/${REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --input comment.json \
              || echo "::warning::Unable to create RSI diff comment."
          fi
